name: Deploy to Vercel

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER: Push any tag matching "deploy-*" to the repo
#
# How to trigger a deployment:
#   git tag deploy-v1.0.0
#   git push origin deploy-v1.0.0
#
# The workflow always checks out the MAIN branch regardless of which
# branch the tag was created on, ensuring only main code is deployed.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "deploy-*"

jobs:
  deploy:
    name: Build & Deploy to Vercel Production
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout main branch ────────────────────────────────────────
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── Step 2: Setup Node.js ────────────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # ── Step 3: Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 4: Build the Vite project ──────────────────────────────────────
      - name: Build project
        run: npm run build

      # ── Step 5: Install Vercel CLI ───────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Step 6: Pull Vercel project settings & environment variables ─────────
      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Step 7: Build using Vercel CLI (generates .vercel/output) ───────────
      - name: Build via Vercel CLI
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Step 8: Deploy prebuilt output to Vercel production ─────────────────
      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
